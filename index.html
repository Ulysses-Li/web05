<!DOCTYPE html>
<!-- 宣告文件型別為 HTML5。 -->
<html lang="zh-Hant">
<!-- 設定網頁語言為繁體中文。 -->

<head>
  <!-- head 區塊放網頁設定、標題、CSS 與外部資源。 -->
  <meta charset="UTF-8" />
  <!-- 設定文字編碼，避免中文亂碼。 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 讓手機、平板、電腦都能依螢幕寬度正確顯示。 -->
  <title>Nine9 刀具快選｜第一層與第二層</title>
  <!-- 設定瀏覽器分頁標題。 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 載入 Bootstrap，先用現成排版與間距工具。 -->
  <style>
    /* CSS 開始：這裡只處理畫面外觀。 */
    body {
      /* 設定整個網頁背景色。 */
      background: #f3f6f8;
      /* 設定主要文字顏色。 */
      color: #1f2937;
      /* 設定中文字體與系統預設字體。 */
      font-family: "Microsoft JhengHei", system-ui, sans-serif;
    }

    .hero {
      /* 設定頁首深綠色背景，呼應你試算表的綠色表頭。 */
      background: linear-gradient(135deg, #14532d, #2f6f55);
      /* 設定頁首文字顏色為白色。 */
      color: white;
      /* 設定頁首上下內距。 */
      padding: 44px 0 34px;
      /* 設定頁首下方圓角。 */
      border-radius: 0 0 28px 28px;
    }

    .hero-badge {
      /* 讓小標籤可以設定寬高與內距。 */
      display: inline-block;
      /* 設定半透明白色背景。 */
      background: rgba(255, 255, 255, .16);
      /* 設定半透明白色邊框。 */
      border: 1px solid rgba(255, 255, 255, .25);
      /* 設定標籤內距。 */
      padding: 6px 14px;
      /* 設定膠囊圓角。 */
      border-radius: 999px;
      /* 設定字體大小。 */
      font-size: 14px;
      /* 設定下方間距。 */
      margin-bottom: 14px;
    }

    .step-card {
      /* 設定白色卡片背景。 */
      background: white;
      /* 設定淡灰色邊框。 */
      border: 1px solid #e5e7eb;
      /* 設定卡片圓角。 */
      border-radius: 22px;
      /* 設定卡片內距。 */
      padding: 24px;
      /* 設定淡陰影，讓區塊浮起來。 */
      box-shadow: 0 14px 34px rgba(15, 23, 42, .08);
    }

    .flow-dot {
      /* 設定步驟圓點寬度。 */
      width: 30px;
      /* 設定步驟圓點高度。 */
      height: 30px;
      /* 設定圓形外觀。 */
      border-radius: 999px;
      /* 設定圓點背景色。 */
      background: #166534;
      /* 設定圓點文字顏色。 */
      color: white;
      /* 啟用彈性排版，方便置中。 */
      display: inline-flex;
      /* 水平置中。 */
      align-items: center;
      /* 垂直置中。 */
      justify-content: center;
      /* 設定粗體。 */
      font-weight: 700;
      /* 設定右方間距。 */
      margin-right: 8px;
    }

    .muted-small {
      /* 設定輔助說明文字顏色。 */
      color: #64748b;
      /* 設定輔助說明文字大小。 */
      font-size: 14px;
    }

    .main-card {
      /* 設定第一層卡片邊框。 */
      border: 2px solid #e5e7eb;
      /* 設定第一層卡片圓角。 */
      border-radius: 18px;
      /* 設定第一層卡片背景。 */
      background: white;
      /* 設定第一層卡片內距。 */
      padding: 20px;
      /* 設定第一層卡片高度填滿欄位。 */
      height: 100%;
      /* 顯示可點選游標。 */
      cursor: pointer;
      /* 設定滑鼠移入動畫。 */
      transition: .18s ease;
    }

    .main-card:hover,
    .main-card.active {
      /* 滑鼠移入或選取時，邊框改綠色。 */
      border-color: #16a34a;
      /* 滑鼠移入或選取時，卡片往上浮。 */
      transform: translateY(-3px);
      /* 滑鼠移入或選取時，加上綠色淡陰影。 */
      box-shadow: 0 12px 26px rgba(22, 163, 74, .14);
    }

    .main-icon {
      /* 設定圖示方塊寬度。 */
      width: 48px;
      /* 設定圖示方塊高度。 */
      height: 48px;
      /* 設定圖示方塊圓角。 */
      border-radius: 14px;
      /* 設定圖示方塊背景色。 */
      background: #dcfce7;
      /* 設定圖示顏色。 */
      color: #166534;
      /* 啟用彈性排版。 */
      display: flex;
      /* 垂直置中。 */
      align-items: center;
      /* 水平置中。 */
      justify-content: center;
      /* 設定圖示大小。 */
      font-size: 24px;
      /* 設定下方間距。 */
      margin-bottom: 14px;
    }

    .problem-grid {
      /* 第二層使用 CSS Grid 排版。 */
      display: grid;
      /* 桌機時每列三張卡片。 */
      grid-template-columns: repeat(3, minmax(0, 1fr));
      /* 設定卡片間距。 */
      gap: 16px;
    }

    .problem-card {
      /* 設定第二層卡片邊框。 */
      border: 2px solid #e5e7eb;
      /* 設定第二層卡片圓角。 */
      border-radius: 18px;
      /* 設定第二層卡片背景。 */
      background: white;
      /* 設定第二層卡片內距。 */
      padding: 18px;
      /* 顯示可點選游標。 */
      cursor: pointer;
      /* 設定卡片最小高度，讓版面整齊。 */
      min-height: 190px;
      /* 使用彈性排版。 */
      display: flex;
      /* 內容由上往下排列。 */
      flex-direction: column;
      /* 設定內容間距。 */
      gap: 12px;
      /* 設定滑鼠動畫。 */
      transition: .18s ease;
    }

    .problem-card:hover,
    .problem-card.active {
      /* 滑鼠移入或選取時，邊框改藍色。 */
      border-color: #2563eb;
      /* 滑鼠移入或選取時，卡片往上浮。 */
      transform: translateY(-3px);
      /* 滑鼠移入或選取時，加上藍色淡陰影。 */
      box-shadow: 0 12px 26px rgba(37, 99, 235, .14);
    }

    .problem-top {
      /* 第二層卡片標題列使用彈性排版。 */
      display: flex;
      /* 讓標題與編號分散到左右。 */
      justify-content: space-between;
      /* 讓內容靠上對齊。 */
      align-items: flex-start;
      /* 設定左右間距。 */
      gap: 12px;
    }

    .problem-label {
      /* 設定小標籤文字顏色。 */
      color: #64748b;
      /* 設定小標籤文字大小。 */
      font-size: 12px;
      /* 設定小標籤粗體。 */
      font-weight: 700;
      /* 設定字距。 */
      letter-spacing: .04em;
    }

    .problem-number {
      /* 設定編號圓點寬度。 */
      width: 32px;
      /* 設定編號圓點高度。 */
      height: 32px;
      /* 設定編號圓點圓形。 */
      border-radius: 999px;
      /* 設定編號圓點背景。 */
      background: #eff6ff;
      /* 設定編號文字顏色。 */
      color: #2563eb;
      /* 啟用彈性排版。 */
      display: inline-flex;
      /* 垂直置中。 */
      align-items: center;
      /* 水平置中。 */
      justify-content: center;
      /* 設定粗體。 */
      font-weight: 700;
      /* 避免編號被壓縮。 */
      flex: 0 0 auto;
    }

    .problem-desc {
      /* 設定需求說明文字顏色。 */
      color: #334155;
      /* 設定需求說明文字大小。 */
      font-size: 14px;
      /* 設定行高。 */
      line-height: 1.55;
      /* 移除預設外距。 */
      margin: 0;
    }

    .problem-note {
      /* 設定第二層卡片底部提示區上框線。 */
      border-top: 1px solid #e5e7eb;
      /* 設定提示區上方內距。 */
      padding-top: 12px;
      /* 讓提示區被推到底部。 */
      margin-top: auto;
      /* 設定提示文字顏色。 */
      color: #64748b;
      /* 設定提示文字大小。 */
      font-size: 13px;
      /* 設定提示文字行高。 */
      line-height: 1.5;
    }

    .summary-box {
      /* 設定目前選擇摘要背景。 */
      background: #0f172a;
      /* 設定目前選擇摘要文字顏色。 */
      color: white;
      /* 設定目前選擇摘要圓角。 */
      border-radius: 22px;
      /* 設定目前選擇摘要內距。 */
      padding: 22px;
    }

    .pill {
      /* 讓標籤可以設定內距。 */
      display: inline-block;
      /* 設定標籤背景。 */
      background: #dcfce7;
      /* 設定標籤文字顏色。 */
      color: #166534;
      /* 設定標籤內距。 */
      padding: 5px 10px;
      /* 設定膠囊圓角。 */
      border-radius: 999px;
      /* 設定標籤字體大小。 */
      font-size: 13px;
      /* 設定右方間距。 */
      margin-right: 6px;
      /* 設定下方間距。 */
      margin-bottom: 8px;
    }

    @media (max-width: 991.98px) {

      /* 平板尺寸以下套用這段。 */
      .problem-grid {
        /* 平板時第二層每列兩張卡片。 */
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 575.98px) {

      /* 手機尺寸以下套用這段。 */
      .problem-grid {
        /* 手機時第二層每列一張卡片。 */
        grid-template-columns: 1fr;
      }
    }
  </style>
  <!-- CSS 結束。 -->
</head>
<!-- head 結束。 -->

<body>
  <!-- body 區塊放使用者看得到的內容。 -->
  <header class="hero">
    <!-- 頁首區塊開始。 -->
    <div class="container">
      <!-- Bootstrap container 讓內容置中並保留左右邊界。 -->
      <span class="hero-badge">Nine9 Tool Selector</span>
      <!-- 頁首小標籤。 -->
      <h1 class="display-5 fw-bold mb-3">刀具快選：先選加工需求，再選問題</h1>
      <!-- 頁面主標題。 -->
      <p class="lead mb-0">這版先處理第一層「做什麼加工？」與第二層「你要解決什麼問題？」</p>
      <!-- 頁面說明文字。 -->
    </div>
    <!-- container 結束。 -->
  </header>
  <!-- 頁首區塊結束。 -->

  <main class="container my-5">
    <!-- main 是主要內容區，my-5 是 Bootstrap 上下外距。 -->
    <section class="step-card mb-4">
      <!-- 第一層選擇區塊開始。 -->
      <h2 class="h4 fw-bold mb-2"><span class="flow-dot">1</span>做什麼加工？</h2>
      <!-- 第一層標題。 -->
      <p class="muted-small mb-4">第一層只放客戶聽得懂的大分類，不先放產品名稱。</p>
      <!-- 第一層說明。 -->
      <div class="row g-3" id="mainOptions"></div>
      <!-- JavaScript 會把第一層卡片放進這個容器。 -->
    </section>
    <!-- 第一層選擇區塊結束。 -->

    <section class="step-card mb-4 d-none" id="problemSection">
      <!-- 第二層選擇區塊開始，d-none 代表一開始先隱藏。 -->
      <h2 class="h4 fw-bold mb-2"><span class="flow-dot">2</span>你要解決什麼問題？</h2>
      <!-- 第二層標題。 -->
      <p class="muted-small mb-4" id="problemHint">請先選擇第一層加工類別。</p>
      <!-- 第二層提示文字，會由 JavaScript 更新。 -->
      <div class="problem-grid" id="problemOptions"></div>
      <!-- JavaScript 會把第二層問題卡片放進這個容器。 -->
    </section>
    <!-- 第二層選擇區塊結束。 -->

    <section class="summary-box d-none" id="summarySection">
      <!-- 目前選擇摘要區塊開始，先隱藏。 -->
      <div class="mb-2">
        <!-- 標籤容器。 -->
        <span class="pill" id="summaryMain">第一層</span>
        <!-- 顯示目前選到的第一層。 -->
        <span class="pill" id="summaryProblem">第二層</span>
        <!-- 顯示目前選到的第二層。 -->
      </div>
      <!-- 標籤容器結束。 -->
      <h2 class="h4 fw-bold mb-2">下一步：第三層才做刀具推薦</h2>
      <!-- 摘要標題。 -->
      <p class="mb-0" id="summaryText">目前只先確認分類邏輯，先不顯示推薦刀具。</p>
      <!-- 摘要文字，會由 JavaScript 更新。 -->
    </section>
    <!-- 目前選擇摘要區塊結束。 -->
  </main>
  <!-- main 結束。 -->

  <script>
    // JavaScript 開始：這裡控制資料與互動。
    const selectorData = [
      // selectorData 是第一層與第二層的資料來源。
      {
        // 第一層：孔加工。
        key: 'hole',
        // key 是程式用的唯一代號。
        icon: '🕳️',

          { name: '我要定位', desc: '鑽孔前先做定位，避免鑽頭偏擺或孔位不準。', note: '第三層再分 ACE Spot Drill / NC Spot Drill / Micro Spot Drill。' },
          // 第二層：一般定位。
          { name: '我要微小孔定位', desc: '小孔、微細孔或精密孔加工前，需要更細緻的定位。', note: '第三層再導向 Micro Spot Drill。' },
          // 第二層：微小孔定位。
          { name: '我要定位加倒角', desc: '同一支刀想完成定位與小倒角，減少換刀時間。', note: '第三層再導向 ACE Spot Drill / NC Spot Drill。' },
          // 第二層：定位加倒角。
          { name: '我要中心孔', desc: '車床加工或軸類工件需要標準中心孔。', note: '第三層再導向 i-Center Center Drill。' },
          // 第二層：中心孔。
          { name: '我要鑽孔', desc: '需要一般鑽孔或高效率鑽孔。', note: '第三層再依孔深與效率分 Super Drill / Super Power Drill。' },
          // 第二層：鑽孔。
          { name: '異形孔 / 薄板孔', desc: '沒有適合鑽頭、孔很大、或薄板孔想用螺旋銑孔完成。', note: '第三層再導向 NC Helix Drill。' },

        ]
        // 孔加工 problems 結束。
      },
      // 孔加工物件結束。
      {
        // 第一層：倒角與 R 角。

        // 程式代號。
        icon: '📐',
        // 顯示圖示。
        title: '倒角 / R角',
        // 第一層名稱。
        en: 'Chamfering & Corner Rounding',
        // 英文名稱。
        desc: '孔口倒角、外徑倒角、背面倒角、外R與內R',
        // 簡短說明。
        problems: [
          // 倒角與 R 角的第二層問題。
          // { name: '我要孔口倒角', desc: '孔加工後，需要在孔口做 C 角或去銳邊。', note: '第三層再依角度與孔徑推薦倒角刀。' },
          // 第二層：孔口倒角。
          { name: '我要外徑倒角', desc: '外輪廓、外圓或邊線需要倒 C 角。', note: '第三層再導向 Chamfer Mill / ACE Spot Drill / NC Spot Drill。' },
          // 第二層：外徑倒角。

          // 第二層：背面倒角。
          { name: '我要定位加倒角', desc: '鑽孔前定位，同時做小倒角，減少加工步驟。', note: '第三層再導向 ACE Spot Drill / NC Spot Drill。' },
          // 第二層：定位加倒角。
          { name: '我要外R角', desc: '外輪廓邊緣需要加工圓角 R。', note: '第三層再導向 Corner Rounding RC Type / Corner Rounding R Type。' },
          // 第二層：外 R 角。
          { name: '我要背面R角', desc: '孔底、背面、反向位置的 R 角修整。', note: '第三層再導向 Corner Rounding R Type。' }
          // 第二層：內 R 角。
        ]
        // 倒角與 R 角 problems 結束。
      },
      // 倒角與 R 角物件結束。
      {
        // 第一層：去毛刺。
        key: 'deburring',
        // 程式代號。
        icon: '✨',
        // 顯示圖示。
        title: '去毛刺',
        // 第一層名稱。
        en: 'Deburring',
        // 英文名稱。
        desc: '孔口毛邊、邊線毛邊、正反面毛邊',
        // 簡短說明。
        problems: [
          // 去毛刺的第二層問題。
          { name: '我要修毛邊', desc: '一般孔口、邊線或加工後產生銳邊毛刺。', note: '第三層再導向 NC Deburring / MCC Deburring Mill。' },
          // 第二層：修毛邊。

          // 第二層：交叉孔去毛刺。
        ]
        // 去毛刺 problems 結束。

      // 去毛刺物件結束。

          // 第二層：深刻字。
          { name: '經濟型生產刻字', desc: '量產時希望刀具壽命穩定、刀片可替換。', note: '第三層再導向 N9MT-W。' },
          // 第二層：大量生產刻字。
          { name: '粗字雕刻', desc: '只需要做點狀標記、定位點或簡單識別點。', note: '第三層再導向 NC Spot Drill。' }
          // 第二層：點刻定位。
        ]
        // 雕刻刻字 problems 結束。
      },
      // 雕刻刻字物件結束。
      {
        // 第一層：螺紋加工。
        key: 'thread',
        // 程式代號。
        icon: '🔩',
        // 顯示圖示。
        title: '螺紋加工',
        // 第一層名稱。
        en: 'Thread Milling',
        // 英文名稱。
        desc: '公制牙、UN牙、平行管牙、錐度管牙',
        // 簡短說明。
        problems: [
          // 螺紋加工的第二層問題。
          { name: '公制牙 M', desc: 'M 牙，例如 M6、M8、M10、M12 等。', note: '第三層再選 Pitch、牙深與材料。' },
          // 第二層：公制牙。
          { name: 'UN牙', desc: 'UNC、UNF、UNEF 等美制螺紋。', note: '第三層再選牙數 TPI 與牙深。' },
          // 第二層：UN 牙。
          { name: 'BSPP / G 平行管牙', desc: '55° 平行管牙，例如 G 1/8、G 1/4、G 1/2。', note: '第三層再選管牙規格與牙深。' },
          // 第二層：BSPP / G。
          { name: 'PT / NPT 錐度管牙', desc: '管用錐度牙，例如 PT、Rc、NPT。', note: '第三層再判斷錐度、牙深與加工方向。' }
          // 第二層：錐度管牙。
        ]
        // 螺紋加工 problems 結束。
      },
      // 螺紋加工物件結束。
      {
        // 第一層：銑削加工。
        key: 'milling',
        // 程式代號。
        icon: '⚙️',
        // 顯示圖示。
        title: '銑削加工',
        // 第一層名稱。
        en: 'Milling',
        // 英文名稱。
        desc: '側銑、槽銑、面銑、大孔螺旋銑削',
        // 簡短說明。
        problems: [
          // 銑削加工的第二層問題。
          { name: '我要側銑', desc: '加工外形輪廓、側壁或側面。', note: '第三層再導向 Power Mill。' },
          // 第二層：側銑。
          // { name: '我要槽銑', desc: '加工溝槽、開槽或需要大量去除材料。', note: '第三層再導向 Power Mill。' },
          // 第二層：槽銑。
          // { name: '我要面銑', desc: '加工平面、基準面或粗加工表面。', note: '第三層再導向 Power Mill。' },
          // 第二層：面銑。
          {name: '我要大量去除材料',desc: '適合粗加工、開槽、側銑與面銑等高效率加工。',note: '第三層再導向 推薦 Power Mill 系列。'},
          // 第二層：V槽銑。
          { name: '我要V槽加工', desc: '加工V型溝槽、開槽。', note: '第三層再導向 ACE Spot Drill / NC Spot Drill。' },
          { name: '我要大孔螺旋銑削', desc: '用銑削方式加工大孔，不使用傳統鑽頭。', note: '第三層再導向 NC Helix Drill。' }
          // 第二層：大孔螺旋銑削。
        ]
        // 銑削加工 problems 結束。
      }
      // 銑削加工物件結束。
    ];
    // selectorData 結束。

    const mainOptions = document.getElementById('mainOptions');
    // 取得第一層卡片容器。
    const problemSection = document.getElementById('problemSection');
    // 取得第二層區塊。
    const problemOptions = document.getElementById('problemOptions');
    // 取得第二層卡片容器。
    const problemHint = document.getElementById('problemHint');
    // 取得第二層提示文字。
    const summarySection = document.getElementById('summarySection');
    // 取得目前選擇摘要區塊。
    const summaryMain = document.getElementById('summaryMain');
    // 取得摘要中的第一層標籤。
    const summaryProblem = document.getElementById('summaryProblem');
    // 取得摘要中的第二層標籤。
    const summaryText = document.getElementById('summaryText');
    // 取得摘要文字。
    let currentMain = null;
    // currentMain 用來記錄目前選到的第一層。

    function renderMainOptions() {
      // renderMainOptions 負責產生第一層卡片。

      // mainOptions.innerHTML = selectorData.map(item => `
      //   <!-- 第一層卡片開始。 -->
      //   <div class="col-md-6 col-lg-2">
      //     <!-- Bootstrap 欄位：中螢幕兩欄，大螢幕三欄。 -->
      //     <div class="main-card" data-main="${item.key}">
      //       <!-- data-main 存放這張卡片對應的 key。 -->
      //       <div class="main-icon">${item.icon}</div>
      //       <!-- 顯示圖示。 -->
      //       <h3 class="h5 fw-bold mb-1">${item.title}</h3>
      //       <!-- 顯示第一層中文名稱。 -->
      //       <div class="muted-small mb-2">${item.en}</div>
      //       <!-- 顯示第一層英文名稱。 -->
      //       <p class="mb-0 small">${item.desc}</p>
      //       <!-- 顯示第一層說明。 -->
      //     </div>
      //     <!-- 第一層卡片內容結束。 -->
      //   </div>
      //   <!-- 第一層卡片結束。 -->
      // `).join('');


      mainOptions.innerHTML = selectorData.map(item => `
        <!-- 第一層卡片開始。 -->
        <div class=" col-md-6 col-lg-2">
          <!-- Bootstrap 欄位：中螢幕兩欄，大螢幕三欄。 -->
          <div class=" main-card" data-main="${item.key}">
            <!-- data-main 存放這張卡片對應的 key。 -->
            <div class=" main-icon">${item.icon}</div>
            <!-- 顯示圖示。 -->
            <h3 class="h5 fw-bold mb-1">${item.title}</h3>
            <!-- 顯示第一層中文名稱。 -->
            <div class="muted-small mb-2">${item.en}</div>
            <!-- 顯示第一層英文名稱。 -->
            <!-- <p class="mb-0 small">${item.desc}</p> -->
            <!-- 顯示第一層說明。 -->
          </div>
          <!-- 第一層卡片內容結束。 -->
        </div>
        <!-- 第一層卡片結束。 -->
      `).join('');

      // map 產生陣列，join 合併成 HTML 字串。

      document.querySelectorAll('[data-main]').forEach(card => {
        // 找出所有第一層卡片並逐一綁定事件。
        card.addEventListener('click', () => selectMain(card.dataset.main));
        // 點擊卡片時，呼叫 selectMain 並帶入卡片的 key。
      });
      // 第一層事件綁定結束。
    }
    // renderMainOptions 函式結束。

    function selectMain(key) {
      // selectMain 負責處理第一層被點選後的狀態。
      currentMain = selectorData.find(item => item.key === key);
      // 用 key 從 selectorData 找出對應的第一層資料。
      document.querySelectorAll('[data-main]').forEach(card => card.classList.remove('active'));
      // 先移除所有第一層卡片的 active 狀態。
      document.querySelector(`[data-main="${key}"]`).classList.add('active');
      // 將目前點選的第一層卡片加上 active 狀態。
      // problemHint.textContent = `你選擇了「${currentMain.title}」，請選擇更細的加工問題。`;
      problemHint.textContent = `「${currentMain.desc}」`;

      // 更新第二層提示文字。
      problemOptions.innerHTML = currentMain.problems.map((problem, index) => `
        <!-- 第二層卡片開始。 -->
        <div class="problem-card" data-problem="${index}">
          <!-- data-problem 存放這張問題卡片在 problems 裡面的序號。 -->
          <div class="problem-top">
            <!-- 第二層卡片標題列開始。 -->
            <div>
              <!-- 標題文字容器。 -->
              <div class="problem-label">加工問題</div>
              <!-- 小標籤。 -->
              <h3 class="h5 fw-bold mb-0">${problem.name}</h3>
              <!-- 第二層問題名稱。 -->
            </div>
            <!-- 標題文字容器結束。 -->
            <span class="problem-number">${index + 1}</span>
            <!-- 第二層卡片編號。 -->
          </div>
          <!-- 第二層卡片標題列結束。 -->
          <p class="problem-desc">${problem.desc}</p>
          <!-- 第二層問題說明。 -->
          <div class="problem-note"><strong>備註：</strong>${problem.note}</div>
          <!-- 第二層底部提示：先保留第三層方向，但不正式推薦刀具。 -->
        </div>
        <!-- 第二層卡片結束。 -->
      `).join('');
      // 將第二層問題資料轉成 HTML。
      problemSection.classList.remove('d-none');
      // 顯示第二層區塊。
      summarySection.classList.add('d-none');
      // 切換第一層時，先隱藏摘要區塊。
      document.querySelectorAll('[data-problem]').forEach(card => {
        // 找出所有第二層卡片並逐一綁定事件。
        card.addEventListener('click', () => selectProblem(Number(card.dataset.problem)));
        // 點擊第二層卡片時，呼叫 selectProblem 並帶入序號。
      });
      // 第二層事件綁定結束。
      problemSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // 自動捲動到第二層區塊。
    }
    // selectMain 函式結束。

    function selectProblem(index) {
      // selectProblem 負責處理第二層被點選後的狀態。
      const problem = currentMain.problems[index];
      // 依照 index 從目前第一層中取得問題資料。
      document.querySelectorAll('[data-problem]').forEach(card => card.classList.remove('active'));
      // 先移除所有第二層卡片的 active 狀態。
      document.querySelector(`[data-problem="${index}"]`).classList.add('active');
      // 將目前點選的第二層卡片加上 active 狀態。
      summaryMain.textContent = currentMain.title;
      // 更新摘要區的第一層文字。
      summaryProblem.textContent = problem.name;
      // 更新摘要區的第二層文字。
      summaryText.textContent = `目前選擇：「${currentMain.title}」→「${problem.name}」。下一版再接第三層刀具推薦與規格篩選。`;
      // 更新摘要說明文字。
      summarySection.classList.remove('d-none');
      // 顯示摘要區塊。
      summarySection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // 自動捲動到摘要區塊。
    }
    // selectProblem 函式結束。

    renderMainOptions();
    // 網頁載入後，先產生第一層卡片。
  </script>
  <!-- JavaScript 結束。 -->
</body>
<!-- body 結束。 -->
